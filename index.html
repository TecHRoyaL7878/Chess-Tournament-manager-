<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal King Maker Chess Club</title>
    <style>
        :root { --primary: #1e293b; --accent: #d4af37; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        
        #sign-in-page { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 90vh; text-align: center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .club-logo { font-size: 60px; margin-bottom: 10px; color: var(--accent); }
        .club-name { font-size: 48px; font-weight: bold; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        .enter-btn { padding: 15px 40px; font-size: 20px; background: var(--accent); color: black; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1000px; margin: 0 auto 20px; display: none; }
        h1, h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        textarea { width: 100%; height: 200px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        
        .controls { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-edit { background: #64748b; color: white; font-size: 11px; padding: 4px 8px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        
        @media print {
            .no-print, #sign-in-page { display: none !important; }
            .card { display: block !important; box-shadow: none; width: 100%; margin: 0; padding: 0; }
            body.print-pairings #leaderboard-view { display: none !important; }
            body.print-standings #main-view { display: none !important; }
        }
    </style>
</head>
<body id="body-tag">

<div id="sign-in-page">
    <div class="club-logo">♔</div>
    <div class="club-name">Royal King Maker <br> Chess Club</div>
    <button class="enter-btn" onclick="checkExisting()">Enter Tournament Manager</button>
</div>

<div class="card no-print" id="setup-view">
    <h1>Tournament Setup</h1>
    <p>Paste student names (one per line):</p>
    <textarea id="player-names" placeholder="Enter Players Name..."></textarea>
    <div class="controls">
        <button class="btn-primary" onclick="initTournament()">Start Round 1</button>
    </div>
</div>

<div class="card" id="main-view">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="round-header">Round 1</h2>
        <div class="no-print">
            <button class="btn-primary" onclick="printSection('pairings')">Print Pairings</button>
            <button class="btn-success" id="next-round-btn" onclick="nextRound()" disabled>Next Round</button>
        </div>
    </div>
    <div id="pairings-list"></div>
    <div class="no-print" style="margin-top:20px; border-top:1px dashed #ccc; padding-top:15px;">
        <input type="text" id="late-name" placeholder="Late student name..." style="padding:10px; width:200px; border-radius:5px; border:1px solid #ccc;">
        <button class="btn-primary" onclick="addLatePlayer()">Add Late Player</button>
        <button class="btn-danger" style="float:right;" onclick="resetTournament()">End Tournament (Reset - 1234)</button>
    </div>
</div>

<div class="card" id="leaderboard-view">
    <h2>Standings</h2>
    <table>
        <thead><tr><th>Rank</th><th>Name</th><th>Pts</th><th>Buc</th><th class="no-print">Action</th></tr></thead>
        <tbody id="standings-body"></tbody>
    </table>
    <button class="no-print btn-primary" style="width:100%; margin-top:15px;" onclick="printSection('standings')">Print Final Standings</button>
</div>

<script>
    let players = [];
    let pairings = [];
    let currentRound = 0;

    function saveData() { localStorage.setItem('royal_chess_pro', JSON.stringify({ players, pairings, currentRound })); }

    function checkExisting() {
        const saved = localStorage.getItem('royal_chess_pro');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players; pairings = data.pairings; currentRound = data.currentRound;
            document.getElementById('sign-in-page').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('leaderboard-view').style.display = 'block';
            renderPairings(); updateStandings(); checkRoundCompletion();
        } else { showSetup(); }
    }

    function resetTournament() {
        if (prompt("Enter Passkey (1234) to DELETE all data:") === "1234") {
            localStorage.removeItem('royal_chess_pro'); location.reload();
        }
    }

    function showSetup() { document.getElementById('sign-in-page').style.display = 'none'; document.getElementById('setup-view').style.display = 'block'; }

    function initTournament() {
        const input = document.getElementById('player-names').value.trim();
        if (!input) return;
        players = input.split('\n').map(n => ({ name: n.trim(), points: 0, opponents: [], hasHadBye: false, buchholz: 0 })).filter(p => p.name !== "");
        generatePairings();
    }

    function generatePairings() {
        currentRound++;
        let pool = [...players].sort((a, b) => b.points - a.points || Math.random() - 0.5);
        pairings = []; let paired = new Set();

        if (pool.length % 2 !== 0) {
            let bIndex = -1;
            for(let i=pool.length-1; i>=0; i--) { if(!pool[i].hasHadBye) { bIndex=i; break; } }
            if(bIndex === -1) bIndex = pool.length-1;
            
            // FIX: splice returns an array, so we must take the first element [0]
            const byeP = pool.splice(bIndex, 1)[0];
            pairings.push({ white: byeP, black: { name: "BYE" }, result: "1-0", locked: true });
            paired.add(byeP.name); 
            byeP.hasHadBye = true; 
            byeP.points += 1;
        }

        for (let i = 0; i < pool.length; i++) {
            let p1 = pool[i]; if (paired.has(p1.name)) continue;
            let p2 = pool.find(pot => !paired.has(pot.name) && pot.name !== p1.name && !p1.opponents.includes(pot.name));
            if (!p2) p2 = pool.find(p => !paired.has(p.name) && p.name !== p1.name);
            if (p2) { pairings.push({ white: p1, black: p2, result: null, locked: false }); paired.add(p1.name); paired.add(p2.name); }
        }
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('leaderboard-view').style.display = 'block';
        renderPairings(); updateStandings(); saveData();
    }

    function renderPairings() {
        document.getElementById('round-header').innerText = "Round " + currentRound;
        let html = `<table><tr><th>Bd</th><th>White</th><th>Result</th><th>Black</th></tr>`;
        pairings.forEach((p, i) => {
            let resCell = p.locked ? `<strong>${p.result}</strong> <button class="no-print btn-edit" onclick="resetBoard(${i})">Edit</button>` : 
                `<div class="score-btns no-print">
                    <button class="btn-primary" onclick="record(${i},'1-0')">1-0</button>
                    <button class="btn-primary" onclick="record(${i},'0.5')">½</button>
                    <button class="btn-primary" onclick="record(${i},'0-1')">0-1</button>
                </div>`;
            html += `<tr><td>${i+1}</td><td>${p.white.name}</td><td>${resCell}</td><td>${p.black.name}</td></tr>`;
        });
        document.getElementById('pairings-list').innerHTML = html + `</table>`;
    }

    function record(idx, res) {
        let p = pairings[idx]; p.result = res; p.locked = true;
        let w = players.find(x => x.name === p.white.name);
        let b = players.find(x => x.name === p.black.name);
        if (res === '1-0') w.points += 1; else if (res === '0-1') b.points += 1; else { w.points += 0.5; b.points += 0.5; }
        w.opponents.push(b.name); b.opponents.push(w.name);
        renderPairings(); updateStandings(); checkRoundCompletion(); saveData();
    }

    function resetBoard(idx) {
        let p = pairings[idx];
        let w = players.find(x => x.name === p.white.name);
        let b = players.find(x => x.name === p.black.name);
        if (p.result === '1-0') w.points -= 1; else if (p.result === '0-1') b.points -= 1; else { w.points -= 0.5; b.points -= 0.5; }
        w.opponents.pop(); b.opponents.pop(); p.result = null; p.locked = false;
        renderPairings(); updateStandings(); checkRoundCompletion(); saveData();
    }

    function updateStandings() {
        players.forEach(p => p.buchholz = p.opponents.reduce((s, o) => s + (players.find(x => x.name === o)?.points || 0), 0));
        let sorted = [...players].sort((a, b) => b.points - a.points || b.buchholz - a.buchholz);
        let html = '';
        sorted.forEach((p, i) => { html += `<tr><td>${i+1}</td><td>${p.name} ${p.hasHadBye?'⭐':''}</td><td>${p.points}</td><td>${p.buchholz.toFixed(1)}</td><td class="no-print"><button class="btn-danger" onclick="removePlayer('${p.name}')">×</button></td></tr>`; });
        document.getElementById('standings-body').innerHTML = html;
    }

    function removePlayer(n) { if(confirm("Remove " + n + "?")) { players = players.filter(p => p.name !== n); pairings = pairings.filter(p => p.white.name !== n && p.black.name !== n); updateStandings(); renderPairings(); saveData(); } }
    function addLatePlayer() { let n = document.getElementById('late-name').value.trim(); if(n) { players.push({ name: n, points: 0, opponents: [], hasHadBye: false }); document.getElementById('late-name').value = ""; updateStandings(); saveData(); } }
    function nextRound() { generatePairings(); }
    function checkRoundCompletion() { document.getElementById('next-round-btn').disabled = !pairings.every(p => p.result !== null); }
    function printSection(t) { document.getElementById('body-tag').className = (t === 'pairings') ? 'print-pairings' : 'print-standings'; window.print(); document.getElementById('body-tag').className = ''; }
</script>
</body>
</html>
